version: '3.8'
services:
  scrobbler:
    build: .
    ports:
      - "5000:5000"
    volumes:
      - scrobbler-data:/data
    environment:
      - PORT=5000
      - SCROBBLER_TOKEN=change-me-in-production
      - DATABASE_PATH=/data/scrobbles.db
    restart: unless-stopped

volumes:
  scrobbler-data:
